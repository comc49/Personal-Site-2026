/* ── Typewriter ── */
function Typewriter({ text, speed = 55, delay = 0 }) {
  const [i, setI] = useState(0);
  useEffect(() => {
    const t = setTimeout(() => {
      const iv = setInterval(() => setI(p => { if (p >= text.length) { clearInterval(iv); return p; } return p + 1; }), speed);
      return () => clearInterval(iv);
    }, delay);
    return () => clearTimeout(t);
  }, [text, speed, delay]);
  return <>{text.slice(0, i)}<span style={{ color: 'var(--red)', animation: i >= text.length ? 'blink 1s step-end infinite' : 'none' }}>|</span></>;
}

/* ── App ── */
function App() {
  const [active, setActive] = useState('hero');
  useEffect(() => {
    const sections = ['hero','about','skills','experience','projects'];
    const handler = () => {
      const scrollY = window.scrollY + 100;
      let cur = 'hero';
      sections.forEach(id => { const el = document.getElementById(id); if (el && el.offsetTop <= scrollY) cur = id; });
      setActive(cur);
    };
    window.addEventListener('scroll', handler, { passive: true });
    return () => window.removeEventListener('scroll', handler);
  }, []);
  return (
    <>
      <NavBar active={active} setActive={setActive} />
      <Hero />
      <About />
      <Skills />
      <Experience />
      <Projects />
      <Footer />
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
