/* ─── CONCEPT 1: Terminal / Code Editor ─────────────────────────── */

    return () => clearInterval(t);

    <div style={{ width: '100%', height: '100%', background: '#0d0d0d', fontFamily: "'IBM Plex Mono', monospace", position: 'relative', overflow: 'hidden' }}>

      {/* Main content */}
      <div style={{ padding: '48px 64px', position: 'relative', zIndex: 2 }}>
        <div style={{ color: '#555', fontSize: 12, marginBottom: 8 }}>// brian-koo/portfolio/src/app/hero.component.ts</div>

        <div style={{ marginBottom: 6 }}>

          <span style={{ color: '#fff' }}> = </span>
          <span style={{ color: '#e8e8e8' }}>&#123;</span>
        </div>
        <div style={{ paddingLeft: 32, marginBottom: 4 }}>

        </div>
        <div style={{ paddingLeft: 32, marginBottom: 4 }}>
          <span style={{ color: '#4ec9b0' }}>framework</span>
          <span style={{ color: '#fff' }}>: </span>
          <span style={{ color: '#ce9178' }}>"Angular"</span><span style={{ color: '#fff' }}>,</span>

          {[['Angular 17+', '████████████', '#DD0031'], ['TypeScript', '███████████░', '#7c8cff'], ['RxJS', '██████████░░', '#4ec9b0'], ['NgRx', '█████████░░░', '#f0a500'], ['Jest / Cypress', '████████░░░░', '#7ccc7c']].map(([name, bar, color]) => (
            <div key={name} style={{ marginBottom: 16 }}>
              <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 4 }}>
                <span style={{ color: 'rgba(255,255,255,0.7)', fontSize: 12 }}>{name}</span>
              </div>
              <div style={{ fontFamily: 'monospace', color, fontSize: 11, letterSpacing: 1 }}>{bar}</div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}
