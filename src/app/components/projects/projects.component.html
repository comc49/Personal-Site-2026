<section id="projects" style="padding: 80px 0; border-top: 1px solid var(--border); background: var(--bg2);">
  <div class="sec-pad">

    <div class="dim" style="font-size: 11px; letter-spacing: 2px; margin-bottom: 32px; text-transform: uppercase;">projects.module.ts</div>

    <div style="font-size: 13px; margin-bottom: 20px;">
      <span class="keyword">const </span>
      <span class="prop">featuredProjects</span>
      <span> = [</span>
    </div>

    <div class="grid-2col-proj">
      @for (project of projects; track project.name) {
        <div style="background: var(--bg); padding: 28px;">

          <div style="display: flex; justify-content: space-between; margin-bottom: 12px; align-items: flex-start; gap: 12px;">
            <div>
              <div style="margin-bottom: 4px; font-size: 12px;">
                <span class="keyword">&#64;</span><span class="type">{{ project.type }}</span>
              </div>
              <div class="bright" style="font-size: 14px; font-weight: 500; line-height: 1.3;">{{ project.name }}</div>
            </div>
            <span style="font-size: 10px; padding: 2px 8px; letter-spacing: 1px; flex-shrink: 0; white-space: nowrap;"
                  [style.color]="statusColor(project.status)"
                  [style.border]="'1px solid ' + statusBorder(project.status)">
              {{ project.status }}
            </span>
          </div>

          <div style="color: var(--text); font-family: var(--sans); font-size: 13px; line-height: 1.7; margin-bottom: 16px;">
            {{ project.desc }}
          </div>

          <div style="display: flex; gap: 6px; flex-wrap: wrap;">
            @for (tag of project.tags; track tag) {
              <span style="font-size: 11px; color: var(--orange); border: 1px solid #ce917822; padding: 2px 8px;">{{ tag }}</span>
            }
          </div>

        </div>
      }
    </div>

    <div style="font-size: 13px;">]<span class="dim">;</span></div>

  </div>
</section>
